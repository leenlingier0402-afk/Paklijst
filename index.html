<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#223A2C" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Inpaklijst Zweden</title>
<style>
  :root{
    --bg:#F6F3EB; --card:#FFFFFF; --ink:#223A2C; --muted:#867F6E;
    --border:#E6E0D1; --sun:#E2A32B; --leaf:#4F7A4E; --lake:#4E7C97;
    --beveren:#B4663F; --goteborg:#3E6E8E; --danger:#B4453B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:660px;margin:0 auto;padding:0 12px calc(78px + env(safe-area-inset-bottom));}
  .eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  h1{font-size:22px;font-weight:800;letter-spacing:-.4px;margin:1px 0 0}

  header{padding-top:max(14px,env(safe-area-inset-top));padding-bottom:6px;
    display:flex;align-items:center;justify-content:space-between}
  .icon-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:7px;color:var(--muted);cursor:pointer;line-height:0}

  .tabs{display:flex;gap:5px;background:#ECE6D7;border-radius:12px;padding:4px;margin:4px 0 10px}
  .tabs button{flex:1;border:none;background:transparent;color:var(--muted);
    font-weight:700;font-size:14px;padding:8px;border-radius:9px;cursor:pointer}
  .tabs button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .summary{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:6px;margin-bottom:10px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 10px}
  .stat .big{font-size:21px;font-weight:800;line-height:1}
  .stat .lab{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
  .stat.hero{border-color:#D8C9A6;background:linear-gradient(180deg,#FFFDF7,#FBF4E4)}
  .stat.hero .big{color:#9a6f12}

  .controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:9px}
  .chip{white-space:nowrap;padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600;
    cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--ink)}
  .chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .seg{display:flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--card)}
  .seg button{border:none;background:transparent;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--ink);color:#fff}
  .spacer{flex:1}
  .togglemini{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}

  section.grp{margin-bottom:12px}
  .grphead{display:flex;align-items:baseline;gap:7px;margin:2px 2px 6px}
  .grphead h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin:0}
  .grphead .n{font-size:11px;color:var(--muted)}
  .rows{display:flex;flex-direction:column;gap:5px}

  .row{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:8px 10px;
    display:flex;align-items:center;gap:9px}
  .row.done .name{text-decoration:line-through;color:var(--muted)}
  .check{width:23px;height:23px;border-radius:7px;flex:0 0 auto;cursor:pointer;border:1.5px solid var(--border);
    background:#fff;display:flex;align-items:center;justify-content:center;color:#fff}
  .check.on{background:var(--leaf);border-color:var(--leaf)}
  .body{flex:1;min-width:0}
  .name{font-size:14px;font-weight:600;word-break:break-word;line-height:1.25}
  .meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid var(--border);cursor:pointer}
  .tag.loc-none{background:#EFEBDF;color:var(--muted);border-color:transparent}
  .tag.loc-Beveren{background:#F6E6DD;color:var(--beveren);border-color:transparent}
  .tag.loc-Göteborg{background:#DFEAF1;color:var(--goteborg);border-color:transparent}
  .tag.src-meenemen{background:#E5EFE3;color:var(--leaf);border-color:#cfe2cb}
  .tag.src-kopen{background:#E1ECF1;color:var(--lake);border-color:#cfe0e8}
  .pencil{background:none;border:none;color:var(--muted);cursor:pointer;padding:5px;line-height:0}

  .qty{display:flex;align-items:center;border:1px solid var(--border);border-radius:9px;overflow:hidden;flex:0 0 auto}
  .qty button{border:none;background:#F4F0E6;width:30px;height:30px;font-size:17px;font-weight:700;color:var(--ink);cursor:pointer}
  .qty span{min-width:26px;text-align:center;font-weight:800;font-size:14px}

  .edit{display:flex;flex-direction:column;gap:8px;width:100%}
  .edit input,.edit select,.addbar input,.addbar select{font-size:15px;padding:9px 10px;border-radius:9px;
    border:1px solid var(--border);outline:none;color:var(--ink);background:#fff;width:100%}
  .edit .erow{display:flex;gap:7px}
  .btn{padding:9px 11px;border-radius:9px;border:none;font-weight:700;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .btn.dark{background:var(--ink);color:#fff;flex:1}
  .btn.ghost{background:#fff;border:1px solid var(--border);color:var(--muted)}
  .btn.del{background:#FBEEEC;border:1px solid #EAD4D0;color:var(--danger)}
  .btn.move{background:#fff;border:1px solid var(--border);color:var(--ink);flex:1}

  .empty{background:var(--card);border:1px dashed var(--border);border-radius:14px;padding:22px;text-align:center;color:var(--muted)}
  .empty .btn{margin:12px auto 0;background:var(--sun);color:#3a2a06;display:inline-flex}

  .sortable-ghost{opacity:.35}
  .sortable-chosen{box-shadow:0 6px 18px rgba(0,0,0,.14)}
  .sortable-drag .pencil,.sortable-drag .qty{opacity:0}

  .addbar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,243,235,.94);
    border-top:1px solid var(--border);backdrop-filter:blur(6px);padding-bottom:env(safe-area-inset-bottom)}
  .addbar .inner{max-width:660px;margin:0 auto;padding:9px 12px}
  .addbar .add-btn{width:100%;padding:11px;border-radius:11px;border:none;background:var(--ink);color:#fff;
    font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .addbar .form{display:flex;flex-direction:column;gap:8px}
  .addbar .frow{display:flex;gap:7px}
  .addbar .go{padding:10px 16px;border-radius:10px;border:none;background:var(--sun);color:#3a2a06;font-weight:800;font-size:15px;cursor:pointer;white-space:nowrap}
  .addbar .x{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer}

  .setup{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:18px;line-height:1.5}
  .setup code{background:#F0ECE0;padding:2px 6px;border-radius:6px;font-size:13px}
  .setup ol{padding-left:20px}
  .muted{color:var(--muted);font-size:13px}
  svg{display:block}

  /* afdrukweergave */
  #printview{display:none}
  @media print{
    body{background:#fff}
    body *{visibility:hidden}
    #printview, #printview *{visibility:visible}
    #printview{display:block;position:absolute;left:0;top:0;width:100%;padding:14px;color:#000}
    #printview h2{font-size:16px;margin:14px 0 6px;border-bottom:1px solid #999;padding-bottom:3px}
    #printview h1{font-size:22px;margin:0 0 4px}
    #printview .pmeta{font-size:12px;color:#444;margin-bottom:8px}
    #printview .pitem{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;break-inside:avoid}
    #printview .pbox{width:13px;height:13px;border:1.3px solid #333;border-radius:3px;flex:0 0 auto}
    #printview .ptag{font-size:11px;color:#555;border:1px solid #bbb;border-radius:8px;padding:0 6px;margin-left:auto}
  }
</style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <div class="addbar" id="addbar"></div>
  <div id="printview"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
