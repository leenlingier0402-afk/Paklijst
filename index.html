<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#223A2C" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Inpaklijst Zweden</title>
<style>
  :root{
    --bg:#F6F3EB; --card:#FFFFFF; --ink:#223A2C; --muted:#867F6E;
    --border:#E6E0D1; --sun:#E2A32B; --leaf:#4F7A4E; --lake:#4E7C97;
    --beveren:#B4663F; --goteborg:#3E6E8E; --danger:#B4453B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:660px;margin:0 auto;padding:0 14px calc(110px + env(safe-area-inset-bottom));}
  .eyebrow{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  h1{font-size:27px;font-weight:800;letter-spacing:-.5px;margin:2px 0 0}

  header{padding-top:max(22px,env(safe-area-inset-top));padding-bottom:8px;
    display:flex;align-items:center;justify-content:space-between}
  .icon-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:9px;color:var(--muted);cursor:pointer;line-height:0}

  /* top tabs */
  .tabs{display:flex;gap:6px;background:#ECE6D7;border-radius:14px;padding:5px;margin:6px 0 14px}
  .tabs button{flex:1;border:none;background:transparent;color:var(--muted);
    font-weight:700;font-size:15px;padding:10px;border-radius:10px;cursor:pointer}
  .tabs button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  /* summary */
  .summary{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;margin-bottom:12px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 13px}
  .stat .big{font-size:26px;font-weight:800;line-height:1}
  .stat .lab{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600}
  .stat.hero{border-color:#D8C9A6;background:linear-gradient(180deg,#FFFDF7,#FBF4E4)}
  .stat.hero .big{color:#9a6f12}

  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:12px}
  .chip{white-space:nowrap;padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;
    cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--ink)}
  .chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .seg{display:flex;gap:0;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--card)}
  .seg button{border:none;background:transparent;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--ink);color:#fff}
  .spacer{flex:1}
  .togglemini{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}

  /* group + rows */
  section.grp{margin-bottom:18px}
  .grphead{display:flex;align-items:baseline;gap:8px;margin:4px 2px 8px}
  .grphead h2{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin:0}
  .grphead .n{font-size:12px;color:var(--muted)}
  .rows{display:flex;flex-direction:column;gap:8px}

  .row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;
    display:flex;align-items:center;gap:11px}
  .row.done .name{ text-decoration:line-through;color:var(--muted)}
  .check{width:27px;height:27px;border-radius:8px;flex:0 0 auto;cursor:pointer;border:1.5px solid var(--border);
    background:#fff;display:flex;align-items:center;justify-content:center;color:#fff}
  .check.on{background:var(--leaf);border-color:var(--leaf)}
  .body{flex:1;min-width:0}
  .name{font-size:15px;font-weight:600;word-break:break-word}
  .meta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid var(--border);cursor:pointer}
  .tag.loc-none{background:#EFEBDF;color:var(--muted);border-color:transparent}
  .tag.loc-Beveren{background:#F6E6DD;color:var(--beveren);border-color:transparent}
  .tag.loc-Göteborg{background:#DFEAF1;color:var(--goteborg);border-color:transparent}
  .tag.src-meenemen{background:#E5EFE3;color:var(--leaf);border-color:#cfe2cb}
  .tag.src-kopen{background:#E1ECF1;color:var(--lake);border-color:#cfe0e8}
  .pencil{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;line-height:0}

  /* qty stepper (bakker) */
  .qty{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex:0 0 auto}
  .qty button{border:none;background:#F4F0E6;width:34px;height:34px;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer}
  .qty span{min-width:30px;text-align:center;font-weight:800;font-size:15px}

  /* edit mode */
  .edit{display:flex;flex-direction:column;gap:9px;width:100%}
  .edit input,.edit select,.addbar input,.addbar select{font-size:15px;padding:10px 11px;border-radius:10px;
    border:1px solid var(--border);outline:none;color:var(--ink);background:#fff;width:100%}
  .edit .erow{display:flex;gap:8px}
  .btn{padding:10px 12px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .btn.dark{background:var(--ink);color:#fff;flex:1}
  .btn.ghost{background:#fff;border:1px solid var(--border);color:var(--muted)}
  .btn.del{background:#FBEEEC;border:1px solid #EAD4D0;color:var(--danger)}

  .empty{background:var(--card);border:1px dashed var(--border);border-radius:16px;padding:26px;text-align:center;color:var(--muted)}
  .empty .btn{margin:14px auto 0;background:var(--sun);color:#3a2a06;display:inline-flex}

  /* add bar */
  .addbar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,243,235,.94);
    border-top:1px solid var(--border);backdrop-filter:blur(6px);padding-bottom:env(safe-area-inset-bottom)}
  .addbar .inner{max-width:660px;margin:0 auto;padding:12px}
  .addbar .add-btn{width:100%;padding:13px;border-radius:13px;border:none;background:var(--ink);color:#fff;
    font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .addbar .form{display:flex;flex-direction:column;gap:9px}
  .addbar .frow{display:flex;gap:8px}
  .addbar .go{padding:11px 18px;border-radius:11px;border:none;background:var(--sun);color:#3a2a06;font-weight:800;font-size:15px;cursor:pointer;white-space:nowrap}
  .addbar .x{padding:11px 13px;border-radius:11px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer}

  .setup{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:24px;line-height:1.55}
  .setup code{background:#F0ECE0;padding:2px 6px;border-radius:6px;font-size:13px}
  .setup ol{padding-left:20px}
  .muted{color:var(--muted);font-size:13px}
  svg{display:block}
</style>
</head>
<body>
  <div class="wrap" id="app"></div>

  <div class="addbar" id="addbar"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
